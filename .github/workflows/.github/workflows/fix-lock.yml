name: Fix Composer Lock

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Sync lock with socialite
        run: composer require laravel/socialite:^5.19 --no-interaction --prefer-dist

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add composer.json composer.lock
          git commit -m "fix: sync composer lock for socialite" || echo "No changes"
          git push
